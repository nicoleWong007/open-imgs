name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-shared:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shared module (Android)
        run: ./gradlew :shared:compileDebugKotlinAndroid

      - name: Build shared module (iOS)
        run: ./gradlew :shared:compileKotlinIosSimulatorArm64

      - name: Run shared module tests
        run: ./gradlew :shared:allTests

  build-android:
    needs: build-shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android lint
        run: ./gradlew :androidApp:lintDebug
